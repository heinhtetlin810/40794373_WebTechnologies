<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GeoQuester — Leaderboard</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/features.css" />
  <style>
    .lb-page { padding: 48px 0 80px; }

    .page-header { text-align: center; margin-bottom: 36px; }
    .page-header h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 900;
      background: linear-gradient(135deg, var(--gold-light), var(--gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 6px;
    }
    .page-header p { color: var(--text-muted); font-size: 0.9rem; }

    /*Filter row*/
    .filter-row {
      display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; align-items: flex-start;
    }
    .filter-group { display: flex; flex-direction: column; gap: 8px; }
    .filter-group-label { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-dim); }
    .filter-pills { display: flex; gap: 6px; flex-wrap: wrap; }

    .fpill {
      padding: 6px 16px; border-radius: 99px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-muted);
      font-family: 'Nunito', sans-serif; font-weight: 700; font-size: 0.78rem;
      cursor: pointer; transition: all var(--transition); white-space: nowrap;
    }
    .fpill:hover { border-color: var(--text-muted); color: var(--text); }
    .fpill.active { background: rgba(240,160,0,0.1); border-color: var(--gold); color: var(--gold); }

    /*Leaderboard card*/
    .lb-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow);
    }
    .lb-card::before {
      content: ''; display: block; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /*Podium*/
    .podium {
      display: grid; grid-template-columns: 1fr 1.12fr 1fr;
      padding: 24px 16px 0; gap: 0; align-items: flex-end; margin-bottom: 4px;
    }
    .pod-spot { display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center; }
    .pod-medal { font-size: 1.6rem; }
    .pod-name  { font-weight: 700; font-size: 0.8rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 90px; }
    .pod-cat   { font-size: 0.65rem; color: var(--text-muted); }
    .pod-score { font-family: 'Cinzel', serif; font-size: 0.95rem; color: var(--gold); }
    .pod-block { border-radius: 8px 8px 0 0; width: 100%; display: flex; align-items: center; justify-content: center; }
    .pod-spot:nth-child(1) .pod-block { height: 50px; background: rgba(192,192,192,0.1); border: 1px solid rgba(192,192,192,0.2); }
    .pod-spot:nth-child(2) .pod-block { height: 80px; background: rgba(240,160,0,0.1);   border: 1px solid rgba(240,160,0,0.25); }
    .pod-spot:nth-child(3) .pod-block { height: 38px; background: rgba(180,100,40,0.1);  border: 1px solid rgba(180,100,40,0.2); }

    /*Entries*/
    .lb-entry {
      display: grid; grid-template-columns: 46px 1fr auto;
      align-items: center; gap: 12px;
      padding: 12px 20px; border-top: 1px solid var(--border);
      transition: background var(--transition);
    }
    .lb-entry:hover { background: var(--surface2); }

    .lb-rank {
      font-family: 'Cinzel', serif; font-size: 1rem; font-weight: 700;
      color: var(--text-dim); text-align: center;
    }
    .lb-entry.rank-1 .lb-rank { color: #ffd700; }
    .lb-entry.rank-2 .lb-rank { color: #c0c0c0; }
    .lb-entry.rank-3 .lb-rank { color: #cd7f32; }

    .lb-info { min-width: 0; }
    .lb-name { font-weight: 700; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-meta {
      display: flex; align-items: center; gap: 8px; margin-top: 3px; flex-wrap: wrap;
    }
    .lb-meta-item { font-size: 0.7rem; color: var(--text-muted); }

    .lb-score-col { text-align: right; }
    .lb-score { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); }
    .lb-correct { font-size: 0.72rem; color: var(--text-muted); margin-top: 2px; }

    /*Empty*/
    .empty-state { text-align: center; padding: 52px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 2.5rem; margin-bottom: 10px; }

    /*Footer row*/
    .lb-footer {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface2);
    }
    .lb-count { font-size: 0.78rem; color: var(--text-muted); }

    @media (max-width: 480px) {
      .podium { display: none; }
      .lb-meta-item:not(:first-child) { display: none; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav__logo">🌍 GeoQuester</a>
    <div class="nav__links">
      <a href="index.html"                       class="nav__link"><span class="icon">🏠</span>Home</a>
      <a href="quiz.html?cat=capitals"   class="nav__link"><span class="icon">🌆</span>Capitals</a>
      <a href="quiz.html?cat=flags"      class="nav__link"><span class="icon">🚩</span>Flags</a>
      <a href="quiz.html?cat=continents" class="nav__link"><span class="icon">🌍</span>Continents</a>
      <a href="quiz.html?cat=shapes"     class="nav__link"><span class="icon">🗺️</span>Map Shapes</a>
      <a href="leaderboard.html"                 class="nav__link active"><span class="icon">🏆</span>Leaderboard</a>
    </div>
  </nav>

  <main class="container lb-page">

    <div class="page-header anim-fadeUp">
      <div style="font-size:2.4rem; margin-bottom:10px;">🏆</div>
      <h1>Leaderboard</h1>
      <p>Top scores across all categories and difficulties</p>
    </div>

    <!-- Filters -->
    <div class="filter-row anim-fadeUp" style="animation-delay:0.1s">
      <div class="filter-group">
        <span class="filter-group-label">Category</span>
        <div class="filter-pills" id="catFilters">
          <button class="fpill active" data-cat="all">All</button>
          <button class="fpill" data-cat="capitals">🌆 Capitals</button>
          <button class="fpill" data-cat="flags">🚩 Flags</button>
          <button class="fpill" data-cat="continents">🌍 Continents</button>
          <button class="fpill" data-cat="shapes">🗺️ Shapes</button>
        </div>
      </div>
      <div class="filter-group">
        <span class="filter-group-label">Difficulty</span>
        <div class="filter-pills" id="diffFilters">
          <button class="fpill active" data-diff="all">All</button>
          <button class="fpill" data-diff="easy">🌱 Easy</button>
          <button class="fpill" data-diff="medium">🌐 Medium</button>
          <button class="fpill" data-diff="hard">🔥 Hard</button>
        </div>
      </div>
    </div>

    <!-- Leaderboard card -->
    <div class="lb-card anim-fadeUp" style="animation-delay:0.2s">
      <div id="podium" class="podium"></div>
      <div id="entriesList"></div>
      <div class="lb-footer">
        <span id="entryCount" class="lb-count"></span>
        <button id="clearBtn" class="btn btn--ghost btn--sm">🗑 Clear All Scores</button>
      </div>
    </div>

    <div style="text-align:center; margin-top:28px;" class="anim-fadeUp" style="animation-delay:0.35s">
      <a href="index.html" class="btn btn--primary">Play Now →</a>
    </div>

  </main>

  <script>
    let filterCat  = 'all';
    let filterDiff = 'all';

    const MEDALS = ['🥇','🥈','🥉'];
    const CAT_LABELS = { capitals:'Capitals', flags:'Flags', continents:'Continents', shapes:'Shapes' };
    const CAT_ICONS  = { capitals:'🌆', flags:'🚩', continents:'🌍', shapes:'🗺️' };

    function getScores() { return JSON.parse(localStorage.getItem('gq_leaderboard') || '[]'); }

    function fmtDate(iso) {
      try { return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}); }
      catch { return ''; }
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function render() {
      let scores = getScores();
      if (filterCat  !== 'all') scores = scores.filter(s => s.category  === filterCat);
      if (filterDiff !== 'all') scores = scores.filter(s => s.difficulty === filterDiff);
      scores.sort((a,b) => b.score - a.score);

      const podiumEl  = document.getElementById('podium');
      const listEl    = document.getElementById('entriesList');
      const countEl   = document.getElementById('entryCount');

      if (!scores.length) {
        podiumEl.innerHTML = '';
        listEl.innerHTML = `<div class="empty-state"><div class="icon">🌍</div><p>No scores yet — go play!</p></div>`;
        countEl.textContent = '0 entries';
        return;
      }

      // Podium (top 3 re-ordered: 2nd · 1st · 3rd)
      const top3 = scores.slice(0, 3);
      const podOrd = [top3[1], top3[0], top3[2]].filter(Boolean);
      const podMedals = top3.length > 1 ? ['🥈','🥇','🥉'] : ['🥇'];
      podiumEl.innerHTML = podOrd.map((s,i) => `
        <div class="pod-spot">
          <div class="pod-medal">${podMedals[i]||''}</div>
          <div class="pod-name">${escHtml(s.name)}</div>
          <div class="pod-cat">${CAT_ICONS[s.category]||''} ${CAT_LABELS[s.category]||s.category}</div>
          <div class="pod-score">${Number(s.score).toLocaleString()}</div>
          <div class="pod-block"></div>
        </div>`).join('');

      // Full list
      listEl.innerHTML = scores.map((s,i) => {
        const rankCls = i < 3 ? `rank-${i+1}` : '';
        const rankTxt = i < 3 ? MEDALS[i] : `#${i+1}`;
        const pct = Math.round((s.correct/s.total)*100);
        return `
          <div class="lb-entry ${rankCls}">
            <div class="lb-rank">${rankTxt}</div>
            <div class="lb-info">
              <div class="lb-name">${escHtml(s.name)}</div>
              <div class="lb-meta">
                <span class="lb-meta-item">${CAT_ICONS[s.category]||''} ${CAT_LABELS[s.category]||s.category}</span>
                <span class="lb-meta-item">·</span>
                <span class="badge badge--${s.difficulty}" style="padding:1px 7px;font-size:0.62rem;">${s.difficulty}</span>
                <span class="lb-meta-item">·</span>
                <span class="lb-meta-item">${fmtDate(s.date)}</span>
              </div>
            </div>
            <div class="lb-score-col">
              <div class="lb-score">${Number(s.score).toLocaleString()}</div>
              <div class="lb-correct">${s.correct}/${s.total} · ${pct}%</div>
            </div>
          </div>`;
      }).join('');

      countEl.textContent = `${scores.length} entr${scores.length===1?'y':'ies'}`;
    }

    // Category filters
    document.getElementById('catFilters').addEventListener('click', e => {
      const btn = e.target.closest('.fpill');
      if (!btn) return;
      document.querySelectorAll('#catFilters .fpill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterCat = btn.dataset.cat;
      render();
    });

    // Diff filters
    document.getElementById('diffFilters').addEventListener('click', e => {
      const btn = e.target.closest('.fpill');
      if (!btn) return;
      document.querySelectorAll('#diffFilters .fpill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      filterDiff = btn.dataset.diff;
      render();
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
      if (confirm('Clear ALL scores? This cannot be undone.')) {
        localStorage.removeItem('gq_leaderboard');
        render();
      }
    });

    render();
  </script>
  <script src="js/theme.js"></script>
</body>
</html>
